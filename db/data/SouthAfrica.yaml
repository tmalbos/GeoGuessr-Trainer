roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: yellow
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra:
        color: white
        pattern: solid
    outer:
      color: yellow
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: white
      count: 2
      pattern: solid
      extra:
        color: white
        pattern: dashed
    outer:
      color: yellow
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: white
      count: 2
      pattern: solid
      extra:
        color: yellow
        pattern: solid
    outer:
      color: yellow
      count: 1
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: "#FFFFFF"
      strips: null
      letter_color: "#000000"
      shape: wide
    back: null