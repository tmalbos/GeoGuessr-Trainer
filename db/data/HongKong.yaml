roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: yellow
      count: 2
      pattern: solid
    rule: urban
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: "#FFFFFF"
      strips: null
      letter_color: "#000000"
      shape: wide
    back:
      color: "#FFFF00"
      strips: null
      letter_color: "#000000"
      shape: wide
  - car_type: normal
    front:
      is_required: true
      color: "#FFFFFF"
      strips: null
      letter_color: "#000000"
      shape: short
    back:
      color: "#FFFF00"
      strips: null
      letter_color: "#000000"
      shape: short