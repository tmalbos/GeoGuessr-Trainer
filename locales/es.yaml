  "  ▸ {title}  ({n} rounds total)": "  ▸ {title}  ({n} rondas en total)"
  "  (reliable range: {lo} - {hi} km)": "  (rango confiable: {lo} - {hi} km)"
  "  Current level    : {label} {arrow} {ci_str}": "  Nivel actual     : {label} {arrow} {ci_str}"
  "  Worst rounds     : {label} {arrow}  (in your worst 10%, equivalent to {km} km error)": "  Peores rondas    : {label} {arrow}  (en tu 10% peor, equivale a {km} km de error)"
  "  Consistency      : {label} {arrow}  (your typical variation is ±{km} km)": "  Consistencia     : {label} {arrow}  (tu variación típica equivale a ±{km} km)"
  "  Key confusion    : you mix up {real} → {guess}  ({freq}x, ~{km} km penalty)": "  Confusión clave  : confundís {real} → {guess}  ({freq}x, ~{km} km de penalidad)"
