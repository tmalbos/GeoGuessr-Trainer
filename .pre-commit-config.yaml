default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
      - id: ruff-format-and-fix
        name: Ruff format & auto-fix
        entry: bash -c 'ruff check --preview --fix-only --unsafe-fixes "$@" && ruff format "$@" && git add "$@"' --
        language: system
        types: [python]
        pass_filenames: true
        require_serial: true
      - id: mypy
        name: Mypy type check
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-added-large-files
        name: Check for large files
        args: ["--maxkb=1000"]
      - id: check-yaml
        name: Check YAML syntax
        args: ["--unsafe"]
      - id: check-toml
        name: Check TOML syntax
