# schema.yaml — Dominio de valores válidos para la base de datos de señales geográficas.
# Convenciones:
#   - Colores: formato hex #RRGGBB
#   - Campos sin tipo explícito son enums cerrados
#   - list_of_ids: referencias a IDs de otras entradas del mismo país

roads:
  lines: # list
    inner:
      color:
        - white
        - faded white
        - yellow
        - orange-tinted yellow
      count:
        type: integer
        min: 0
        max: 2
      pattern:
        - solid
        - dashed
        - short-dashed
      extra:
        color:
          - white
          - yellow
          - green
        pattern:
          - solid
          - dashed
    outer:
      color:
        - white
        - yellow
        - red
      count:
        type: integer
        min: 0
        max: 2
      pattern:
        - solid
        - dashed
        - short-dashed
        - squares
    rule:
      - whole-country
      - region-dependant
      - urban
      - rural
license_plates: # list
  car_type:
    - normal
    - commercial
    - taxi
    - motorcycle
    - military
    - government
    - electric
  front:
    is_required: boolean
    color: hex
    strips: # Optional
      color: hex
      side:
        - left
        - right
        - top
        - bottom
    letter_color: hex
    shape:
      - wide
      - short
      - tall
      - standard
  back: # Optional if same as front
    color: hex
    strips: # Optional
      color: hex
      side:
        - left
        - right
        - top
        - bottom
    letter_color: hex
    shape:
      - wide
      - short
      - tall
      - standard
bollards: # list
  - regions:
      - string
    shape:
      - cylindrical
      - triangular
      - square
      - flat
      - wedge
      - hollow_curved
      - half_circle
      - octagonal
      - cuboidal
      - bowling_pin
      - tapered
      - baton
    size: # Optional
      - small
      - thin
      - wide
    mounting: # Optional
      - standard
      - stick
    color:
      - white
      - black
      - yellow
      - orange
      - red
      - brown
      - grey
    top: # Optional
      style:
        - flat
        - pointed
        - nipple_cap
        - snow_pole
        - thin_flat
        - rounded
      color: # Optional
        - black
        - red
        - white
    stripes: # Optional
      - color:
          - black
          - red
          - orange
          - white
          - yellow
          - grey
        position:
          - top
          - middle
          - bottom
        orientation:
          - horizontal
          - diagonal
        count: integer
    reflectors: # Optional
      - color:
          - white
          - grey
          - dark_red
          - dark_grey
          - yellow
          - orange
          - red
          - blue
          - green
          - silver
        shape:
          - circular
          - rectangular
          - octagonal
          - square
          - diamond
        place:
          - front
          - back
          - band
        position: # Optional
          - top
          - middle
          - bottom
        offset: # Optional
          - center
          - left
          - right
        count: integer # Optional
        bolt_count: integer # Optional
    markings: # Optional
      - type:
          - text
          - number
          - crown