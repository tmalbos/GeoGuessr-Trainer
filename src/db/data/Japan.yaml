roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: yellow
      count: 1
      pattern: solid
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: yellow
      count: 2
      pattern: solid
      extra:
        color: white
        pattern: solid
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips: null
      letter_color: green
      shape: tall
    back: null
  - car_type: normal
    front:
      is_required: true
      color: yellow
      strips: null
      letter_color: black
      shape: tall
    back: null