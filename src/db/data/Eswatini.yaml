roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: yellow
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: white
      count: 2
      pattern: solid
      extra:
        color: white
        pattern: dashed
    outer:
      color: yellow
      count: 1
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        - color: green
          side: bottom
      letter_color: black
      shape: short
    back: null