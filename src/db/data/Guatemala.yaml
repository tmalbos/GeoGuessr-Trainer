roads:
  lines:
    - inner:
        color: yellow
        count: 1
        pattern: dashed
        extra: null
      outer:
        color: white
        count: 1
        pattern: solid
      rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips: null
      letter_color: blue
      shape: short
    back: null
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        - color: green
          side: left
      letter_color: blue
      shape: short
    back: null