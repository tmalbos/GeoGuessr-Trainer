roads:
  lines:
  - inner: null
    outer:
      color: white
      count: 1
      pattern: dashed
    rule: rural
  - inner:
      color: orange-tinted yellow
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        - color: blue
          side: left
      letter_color: black
      shape: wide
    back: null
  - car_type: commercial
    front:
      is_required: true
      color: '#06402B'
      strips:
        - color: blue
          side: left
      letter_color: black
      shape: wide
    back: null