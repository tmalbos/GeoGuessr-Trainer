roads:
  lines:
  - inner:
      color: faded white
      count: 2
      pattern: solid
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: whole-country
  - inner:
      color: yellow
      count: 2
      pattern: solid
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        - color: blue
          side: left
      letter_color: black
      shape: wide
    back: null
  - car_type: normal
    front:
      is_required: true
      color: white
      strips: null
      letter_color: black
      shape: wide
    back: null
  - car_type: taxi
    front:
      is_required: true
      color: yellow
      strips: null
      letter_color: black
      shape: wide
    back: null