roads:
  lines:
    - inner:
        color: yellow
        count: 1
        pattern: solid
        extra: null
      outer:
        color: white
        count: 1
        pattern: solid
      rule: whole-country
    - inner:
        color: white
        count: 1
        pattern: solid
        extra: null
      outer:
        color: white
        count: 1
        pattern: solid
      rule: whole-country
    - inner:
        color: white
        count: 1
        pattern: dashed
        extra: null
      outer:
        color: white
        count: 1
        pattern: solid
      rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        - color: blue
          side: left
        - color: blue
          side: right
      letter_color: black
      shape: wide
    back: null
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        - color: red
          side: left
      letter_color: black
      shape: wide
    back: null
  - car_type: taxi
    front:
      is_required: true
      color: yellow
      strips:
        - color: blue
          side: left
        - color: blue
          side: right
      letter_color: red
      shape: wide
    back: null