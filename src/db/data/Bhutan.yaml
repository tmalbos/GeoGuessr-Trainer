roads:
  lines:
    - inner:
        color: white
        count: 1
        pattern: dashed
      outer:
        color: white
        count: 1
        pattern: solid
      extra: null
      rule: region-dependant
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: red
      strips: null
      letter_color: white
      shape: short
    back: null
  - car_type: taxi
    front:
      is_required: true
      color: yellow
      strips: null
      letter_color: black
      shape: short
    back: null