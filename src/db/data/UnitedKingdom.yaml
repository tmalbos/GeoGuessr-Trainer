roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: whole-country
  - inner:
      color: white
      count: 1
      pattern: dashed
    outer:
      color: yellow
      count: 2
      pattern: solid
    extra: null
    rule: urban
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips: null
      letter_color: black
      shape: wide
    back:
      color: yellow
      strips: null
      letter_color: black
      shape: wide
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        color: blue
        side: left
      letter_color: black
      shape: wide
    back:
      color: yellow
      strips:
        color: blue
        side: left
      letter_color: black
      shape: wide