roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: white
      count: 1
      pattern: dashed
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: blue
      strips: null
      letter_color: white
      shape: wide
    back: null
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        - color: blue
          side: left
      letter_color: black
      shape: wide
    back: null