roads:
  lines:
  - inner:
      color: white
      count: 2
      pattern: solid
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: white
      count: 1
      pattern: solid
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
signs:
  stop:
    shape: octagon
    background_color: "#FF0000"
    text:
      value: "BERHENTI"
      color: white
    border:
      has_border: true
      thickness: standard
      color: white
poles:
  - shape: round
    material: wood
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: black
      strips: null
      letter_color: white
      shape: standard
    back: null
  - car_type: electric
    front:
      is_required: true
      color: white
      strips:
        color: green
        side: bottom
      letter_color: black
      shape: standard
    back: null
chevrons:
  background_color: "#FFA500"
  arrow_color: black
  border_color: null
bollards:
  - color: white
    shape: rectangular
    material: concrete
    height: standard
    top:
      color: white
      shape: flat
    reflectors:
      - place: front
        position: top
        color: "#FF0000"
        shape: rectangle
        orientation: vertical
        size: standard
      - place: front
        position: middle
        color: "#FF0000"
        shape: rectangle
        orientation: vertical
        size: standard
    stripes: null