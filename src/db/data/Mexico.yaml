roads:
  lines:
  - inner:
      color: yellow
      count: 1
      pattern: solid
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: yellow
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: yellow
      count: 2
      pattern: solid
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
signs:
  stop:
    shape: octagon
    background_color: "#FF0000"
    text:
      value: "ALTO"
      color: white
    border:
      has_border: true
      thickness: standard
      color: white
poles:
  - shape: octogonal
    material: concrete
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips: null
      letter_color: black
      shape: short
    back: null
chevrons: null
bollards:
  - color: white
    shape: cylindrical
    material: concrete
    height: standard
    top:
      color: white
      shape: dome
    reflectors:
      - place: front
        position: top
        color: yellow
        shape: rectangle
        orientation: horizontal
        size: big
    stripes:
      position: bottom
      color: black
      orientation: horizontal
      size: thick
  - color: white
    shape: cylindrical
    material: concrete
    height: standard
    top:
      color: white
      shape: dome
    reflectors: null
    stripes:
      position: bottom
      color: black
      orientation: horizontal
      size: thick

