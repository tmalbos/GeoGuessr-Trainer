roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: whole-country
  - inner: null
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: rural
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips: null
      letter_color: black
      shape: wide
    back:
      color: yellow
      strips: null
      letter_color: black
      shape: tall