roads:
  lines:
    - inner:
        color: white
        count: 2
        pattern: dashed
      outer:
        color: white
        count: 1
        pattern: solid
      extra:
        color: green
        pattern: solid
      rule: whole-country
    - inner:
        color: white
        count: 2
        pattern: dashed
      outer:
        color: white
        count: 1
        pattern: short-dashed
      extra: null
      rule: whole-country
    - inner:
        color: white
        count: 2
        pattern: solid
      outer:
        color: white
        count: 1
        pattern: solid
      extra: null
      rule: whole-country
    - inner: null
      outer:
        color: white
        count: 1
        pattern: short-dashed
      extra: null
      rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: yellow
      strips:
        - color: blue
          side: left
      letter_color: black
      shape: wide
    back: null
  - car_type: taxi
    front:
      is_required: true
      color: blue
      strips: null
      letter_color: black
      shape: wide
    back: null