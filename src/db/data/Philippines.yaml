roads:
  lines:
  - inner:
      color: orange-tinted yellow
      count: 1
      pattern: solid
      extra:
        color: white
        pattern: dashed
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: orange-tinted yellow
      count: 2
      pattern: solid
      extra:
        color: white
        pattern: solid
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: "#FFFFFF"
      strips: null
      letter_color: "#000000"
      shape: standard
    back: null
  - car_type: normal
    front:
      is_required: false
      color: "#FFFFFF"
      strips:
        color: "#06402B"
        side: bottom
      letter_color: "#06402B"
      shape: standard
    back: null