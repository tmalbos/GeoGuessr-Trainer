roads:
  lines:
  - inner:
      color: orange-tinted yellow
      count: 1
      pattern: solid
    outer:
      color: white
      count: 1
      pattern: solid
    extra:
      color: white
      pattern: dashed
    rule: whole-country
  - inner:
      color: orange-tinted yellow
      count: 2
      pattern: solid
    outer:
      color: white
      count: 1
      pattern: solid
    extra:
      color: white
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips: null
      letter_color: black
      shape: standard
    back: null
  - car_type: normal
    front:
      is_required: false
      color: white
      strips:
        color: green
        side: bottom
      letter_color: green
      shape: standard
    back: null