roads:
  lines:
  - inner: null
    outer:
      color: white
      count: 1
      pattern: short-dashed
    rule: rural
  - inner:
      color: white
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: "#FFFFFF"
      strips:
        - color: "#000080"
          side: left
      letter_color: "#000000"
      shape: wide
    back: null
  - car_type: taxi
    front:
      is_required: true
      color: "#FFFF00"
      strips:
        - color: "#000080"
          side: left
      letter_color: "#000000"
      shape: wide
    back: null