roads:
  lines:
  - inner:
      color: yellow
      count: 2
      pattern: solid
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
  - inner:
      color: yellow
      count: 1
      pattern: dashed
      extra: null
    outer:
      color: white
      count: 1
      pattern: solid
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: "#FFFFFF"
      strips: null
      letter_color: "#000000"
      shape: standard
    back: null
  - car_type: normal
    front:
      is_required: true
      color: "#FFFFFF"
      strips:
        color: "#000080"
        side: top
      letter_color: "#000000"
      shape: standard
    back: null
  - car_type: commercial
    front:
      is_required: true
      color: "#8B0000"
      strips: null
      letter_color: "#FFFFFF"
      shape: standard
    back: null