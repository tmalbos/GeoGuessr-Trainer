roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: whole-country
  - inner:
      color: yellow
      count: 1
      pattern: solid
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: whole-country
  - inner:
      color: yellow
      count: 2
      pattern: solid
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: black
      strips: null
      letter_color: white
      shape: standard
    back: null
  - car_type: commercial
    front:
      is_required: true
      color: white
      strips:
        color: orange
        side: top
      letter_color: black
      shape: standard
    back: null
  - car_type: commercial
    front:
      is_required: true
      color: orange
      strips: null
      letter_color: black
      shape: standard
    back: null