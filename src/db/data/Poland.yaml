roads:
  lines:
    - inner:
        color: white
        count: 2
        pattern: solid
      outer:
        color: white
        count: 1
        pattern: solid
      extra: null
      rule: whole-country
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        - color: blue
          side: left
      letter_color: black
      shape: wide
    back: null
  - car_type: electric
    front:
      is_required: true
      color: green
      strips:
        - color: blue
          side: left
      letter_color: black
      shape: wide
    back: null