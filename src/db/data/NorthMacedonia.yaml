roads:
  lines:
  - inner:
      color: white
      count: 1
      pattern: dashed
    outer:
      color: white
      count: 1
      pattern: solid
    extra: null
    rule: whole-country
  - inner:
      color: yellow
      count: 1
      pattern: solid
    outer:
      color: yellow
      count: 1
      pattern: solid
    extra: null
    rule: region-dependant
license_plates:
  - car_type: normal
    front:
      is_required: true
      color: white
      strips:
        color: blue
        side: left
      letter_color: black
      shape: wide
    back: null
